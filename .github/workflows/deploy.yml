name: Deploy Spring (② EC2)

on:
  push:
    branches: [main]            # develop→main 머지(=릴리스) 시 배포
    paths:
      - 'src/**'
      - 'build.gradle'
      - 'settings.gradle'
      - 'Dockerfile'
      - 'deploy/**'
      - '.github/workflows/deploy.yml'
  workflow_dispatch:

# 동시 배포 방지 (연속 push/중복 dispatch 시 race condition 차단)
concurrency:
  group: deploy-spring-${{ github.ref }}
  cancel-in-progress: false

env:
  AWS_REGION: ap-northeast-2
  ECR_REPO: codebomb-spring
  S3_PREFIX: s3://codebomb-deploy/spring/
  EC2_NAME_TAG: codebomb-spring

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write             # OIDC 토큰 발급(키리스 핵심)
      contents: read              # 체크아웃 읽기만
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4
        with:
          persist-credentials: false   # 이후 스텝에 토큰 잔존 방지

      - name: AWS 자격증명 (OIDC, codebomb-github-actions)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::143924590342:role/codebomb-github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: ECR 로그인
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: 이미지 빌드 & ECR 푸시
        # Dockerfile 멀티스테이지가 gradle bootJar 수행 → 러너에서 빌드 중복 안 함
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build -t "$REGISTRY/$ECR_REPO:$TAG" -t "$REGISTRY/$ECR_REPO:latest" .
          docker push "$REGISTRY/$ECR_REPO:$TAG"
          docker push "$REGISTRY/$ECR_REPO:latest"

      - name: 배포파일 S3 업로드
        # scp 대체. .env/secrets는 S3에 없으므로(--delete 미사용) EC2 기존 파일 유지
        run: aws s3 sync deploy/ "$S3_PREFIX"

      - name: ② EC2에서 받아 기동 (SSM send-command)
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
        run: |
          set -euo pipefail
          INSTANCE_ID=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=$EC2_NAME_TAG" "Name=instance-state-name,Values=running" \
            --query "Reservations[].Instances[].InstanceId" --output text)
          echo "대상 인스턴스: $INSTANCE_ID"
          if [ -z "$INSTANCE_ID" ]; then echo "running 인스턴스 없음"; exit 1; fi

          # EC2에서 실행할 명령 (S3 동기화 → ECR 로그인 → compose pull/up → 헬스체크)
          cat > params.json <<EOF
          {"commands":[
            "set -e",
            "export ECR_REGISTRY=$REGISTRY",
            "aws s3 sync $S3_PREFIX /opt/spring",
            "cd /opt/spring",
            "cp /opt/spring/.env /opt/spring/.env.bak 2>/dev/null || true",
            "aws ssm get-parameters-by-path --path /codebomb/deploy/ --recursive --with-decryption --region $AWS_REGION --query 'Parameters[].[Name,Value]' --output text | sed 's|^/codebomb/deploy/||; s|[[:blank:]]|=|' > /opt/spring/.env",
            "echo ECR_REGISTRY=$REGISTRY >> /opt/spring/.env",
            "aws ecr get-login-password --region $AWS_REGION | docker login --username AWS --password-stdin $REGISTRY",
            "docker compose pull",
            "docker compose up -d",
            "echo '헬스 체크: localhost:8080/actuator/health 대기...'",
            "for i in \$(seq 1 40); do curl -fs -o /dev/null http://localhost:8080/actuator/health && { echo 'OK: health UP'; break; }; [ \$i -eq 40 ] && { echo 'FAIL: 200초 후에도 비정상'; docker compose logs --tail 80 spring; exit 1; }; sleep 5; done",
            "docker image prune -f"
          ]}
          EOF

          CMD_ID=$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy spring ${{ github.sha }}" \
            --timeout-seconds 600 \
            --parameters file://params.json \
            --query "Command.CommandId" --output text)
          echo "CommandId: $CMD_ID"

          # 명령 종료까지 대기(성공/실패 확정될 때까지)
          aws ssm wait command-executed --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" || true

          echo "===== EC2 표준 출력 ====="
          aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query "StandardOutputContent" --output text
          STATUS=$(aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
            --query "Status" --output text)
          echo "최종 상태: $STATUS"
          if [ "$STATUS" != "Success" ]; then
            echo "===== EC2 표준 에러 ====="
            aws ssm get-command-invocation --command-id "$CMD_ID" --instance-id "$INSTANCE_ID" \
              --query "StandardErrorContent" --output text
            exit 1
          fi
