global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "spring"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["<SPRING_PRIVATE_IP>:8080"]   # ② Spring 사설IP — EC2 생성 후 기입
        labels:
          application: code-bomba-lms

  # 챗봇(④)은 FastAPI에 prometheus exporter 붙으면 주석 해제
  # - job_name: "chatbot"
