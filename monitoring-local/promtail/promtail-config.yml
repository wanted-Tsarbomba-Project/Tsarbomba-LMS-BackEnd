server:
  http_listen_port: 9080

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: lms-logs
    static_configs:
      - targets: [localhost]
        labels:
          job: lms
          __path__: /var/log/lms/lms-*.log
    pipeline_stages:
      - json:
          expressions:
            level: level
            log_type: "\"log-type\""
      - labels:
          level:
          log_type:
