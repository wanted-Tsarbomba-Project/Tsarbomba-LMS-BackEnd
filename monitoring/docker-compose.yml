services:
  prometheus:
    image: prom/prometheus:v2.53.0
    container_name: lms-prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --web.enable-remote-write-receiver
    extra_hosts:
      - "host.docker.internal:host-gateway"

  grafana:
    image: grafana/grafana:11.1.0
    container_name: lms-grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
      - loki

  loki:
    image: grafana/loki:3.0.0
    container_name: lms-loki
    ports:
      - "3100:3100"
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - loki-data:/loki

  promtail:
    image: grafana/promtail:3.0.0
    container_name: lms-promtail
    volumes:
      - ./promtail/promtail-config.yml:/etc/promtail/config.yml:ro
      - ../logs:/var/log/lms:ro
    command: -config.file=/etc/promtail/config.yml
    depends_on:
      - loki

  mysql:
    image: mysql:8.0
    container_name: lms-loadtest-mysql
    ports:
      - "3307:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=loadtest
      - MYSQL_DATABASE=lms_loadtest
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql-data:/var/lib/mysql

  k6:
    image: grafana/k6:0.52.0
    container_name: lms-k6
    profiles: ["loadtest"]
    volumes:
      - ./k6/scripts:/scripts:ro
      - ./k6/lib:/lib:ro
      - ./k6/results:/results
    environment:
      - K6_PROMETHEUS_RW_SERVER_URL=http://prometheus:9090/api/v1/write
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  prometheus-data:
  grafana-data:
  loki-data:
  mysql-data:
