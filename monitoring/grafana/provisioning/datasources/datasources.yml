apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus            # 대시보드 JSON 이 고정 uid 로 참조
    access: proxy
    url: http://prometheus:9090
    isDefault: true

  - name: Loki
    type: loki
    uid: loki                  # 대시보드 JSON 이 고정 uid 로 참조
    access: proxy
    url: http://loki:3100
