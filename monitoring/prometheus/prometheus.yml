global:
  scrape_interval: 5s

scrape_configs:
  - job_name: "lms-app"
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ["host.docker.internal:8080"]
        labels:
          application: code-bomba-lms
  - job_name: "lms-python"
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8000"]
        labels:
          application: code-bomba-python
