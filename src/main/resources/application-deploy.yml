# ===== 배포(deploy) 프로파일 — ② Spring EC2 =====
# 비밀값은 EC2 /opt/spring/.env → 컨테이너 환경변수로 주입 (이 파일엔 자리표시자만)
# 활성화: SPRING_PROFILES_ACTIVE=deploy
spring:
  datasource:
    url: ${DB_URL}                 # 새 RDS codebomb (deploy/.env)
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      # 첫 부팅만 .env에서 DDL_AUTO=update로 테이블 생성 → 확인 후 .env에서 제거하면 validate
      ddl-auto: ${DDL_AUTO:validate}
    open-in-view: false
  data:
    redis:
      host: ${REDIS_HOST}          # ③ 모니터링 EC2 사설IP
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:} # ③ redis requirepass

# JWT 만료시간 — base엔 secret만 있고 만료값은 local에만 있음(JwtTokenProvider가 기본값 없이 읽음)
jwt:
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}      # 1시간
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7일

# 챗봇 FastAPI(④ EC2 사설IP) — base는 localhost라 배포에서 override
fastapi:
  url: ${FASTAPI_URL}

# ===== 모니터링: ③ Prometheus가 스크랩하므로 deploy에서도 노출 필수 =====
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: code-bomba-lms
