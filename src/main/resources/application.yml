spring:
  application:
    name: Code-Bomba-LMS
  profiles:
    active: local
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000


#챗봇설정
fastapi:
  url: http://localhost:8000

chat:
  max-history-messages: 20
# 코드 실행기(처음엔 로컬 파이썬으로만)
code:
  runner:
    python-command: python
    timeout-seconds: 10
