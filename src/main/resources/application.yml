# ============================================================
# 공통(base) — 모든 환경 공통 "구조" + 환경무관 고정값(공개 안전).
#
# public 레포 → 이 파일엔 비밀·환경종속 값을 평문으로 두지 않는다.
#   환경종속/비밀은 ${PLACEHOLDER} 로만 선언하고 실제 값은:
#     - local / loadtest : application-{profile}.yml (gitignore, 평문 허용)
#     - deploy           : EC2 /opt/spring/.env       (커밋 금지)
#   에서 주입한다.
# base 에 남는 진짜값은 "모든 환경 동일 + 공개돼도 안전한 것"만(구글 endpoint 등).
# ============================================================
spring:
  application:
    name: Code-Bomba-LMS
  profiles:
    active: local              # 로컬 기본. 배포는 .env 의 SPRING_PROFILES_ACTIVE=deploy 가 환경변수 우선순위로 override
  mvc:
    async:
      request-timeout: 120000  # SSE: WebClient responseTimeout(100s)보다 길게 둬야 error 이벤트 전송 가능

  # 환경종속 — 실제 값은 프로파일/.env. driver 만 공통.
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: ${DDL_AUTO:validate}   # 공통 기본 validate. loadtest 는 update override, deploy 는 .env
    open-in-view:
      false

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}

  # smtp 구조는 공통 고정값(공개 안전), 계정/비번만 환경종속.
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

server:
  forward-headers-strategy: framework

jwt:
  secret: ${JWT_SECRET}
  access-expiration: ${JWT_ACCESS_EXPIRATION:3600000}      # 1시간
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}  # 7일(기본). local 은 override

oauth:
  google:
    client-id: ${GOOGLE_CLIENT_ID}
    client-secret: ${GOOGLE_CLIENT_SECRET}
    redirect-uri: ${GOOGLE_REDIRECT_URI:http://localhost:8080/api/v1/auth/oauth2/callback/google}
    # 구글 OAuth2 고정 endpoint (공개 표준값)
    authorization-uri: https://accounts.google.com/o/oauth2/v2/auth
    token-uri: https://oauth2.googleapis.com/token
    user-info-uri: https://www.googleapis.com/oauth2/v3/userinfo
    scope: openid,email,profile
  # 신규 가입 시 추가정보 입력 페이지 (콜백 redirect 대상)
  additional-info-uri: ${OAUTH_ADDITIONAL_INFO_URI:http://localhost:3001/oauth2/additional-info}
  success-uri: ${OAUTH_SUCCESS_URI:http://localhost:3001}

app:
  cookie:
    secure: ${COOKIE_SECURE:false}

# CORS 허용 오리진(콤마 구분). 기본 로컬 FE, 배포는 .env override
cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3001}

# 챗봇 FastAPI — 기본 로컬, 배포는 .env(④ 사설IP) override
fastapi:
  url: ${FASTAPI_URL:http://localhost:8000}

chat:
  max-history-messages: 20

gcp:
  project-id: ${GCP_PROJECT_ID:project-9eb65e0d-55b9-4a40-878}
  storage:
    bucket: ${GCP_STORAGE_BUCKET:codebombalms}
    dataset-prefix: ${GCP_STORAGE_DATASET_PREFIX:problem_dataset}
    badge-image-prefix: ${GCP_BADGE_IMAGE_PREFIX:badge_image}
    course-thumbnail-prefix: ${GCP_COURSE_THUMBNAIL_PREFIX:course_thumbnail_images}
    lecture-material-prefix: ${GCP_STORAGE_LECTURE_MATERIAL_PREFIX:lecture_materials}

code-runner:
  type: cloud-run
  cloud-run:
    endpoint: ${CODE_RUNNER_CLOUD_RUN_ENDPOINT:https://codebomba-python-runner-227846656059.asia-northeast3.run.app/execute}
    connect-timeout-ms: ${CODE_RUNNER_CONNECT_TIMEOUT_MS:3000}
    read-timeout-ms: ${CODE_RUNNER_READ_TIMEOUT_MS:15000}

code-execution:
  default-timeout-ms: ${CODE_EXECUTION_DEFAULT_TIMEOUT_MS:5000}

# ===== 모니터링 — 모든 환경 공통 노출 (③ Prometheus 가 /actuator/prometheus 스크랩) =====
management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  endpoint:
    health:
      show-details: never
  metrics:
    tags:
      application: code-bomba-lms
