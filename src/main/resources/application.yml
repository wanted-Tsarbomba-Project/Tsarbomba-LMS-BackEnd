spring:
  application:
    name: Code-Bomba-LMS
  profiles:
    active: local, mock
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

jwt:
  secret: ${JWT_SECRET}
  expiration: 3600000


fastapi:
  url: http://localhost:8000

chat:
  max-history-messages: 20

gcp:
  project-id: ${GCP_PROJECT_ID:project-9eb65e0d-55b9-4a40-878}
  storage:
    bucket: ${GCP_STORAGE_BUCKET:codebombalms}
    dataset-prefix: ${GCP_STORAGE_DATASET_PREFIX:problem_dataset}
  credentials:
    location: ${GCP_CREDENTIALS_LOCATION:file:./secrets/gcp-storage-key.json}

#로컬 코드 실행기
code:
  runner:
    python-command: python
    timeout-seconds: 10
